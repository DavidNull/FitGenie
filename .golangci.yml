run:
  timeout: 5m
  
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gofmt
    - goimports
  disable:
    - typecheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: fitgenie

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
