version: '3.8'

services:
  # PostgreSQL with pgvector for vector similarity search
  postgres:
    image: pgvector/pgvector:pg15
    container_name: fitgenie-postgres
    environment:
      POSTGRES_DB: fitgenie
      POSTGRES_USER: fitgenie
      POSTGRES_PASSWORD: fitgenie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitgenie -d fitgenie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack for S3 simulation (photo storage)
  localstack:
    image: localstack/localstack:3.0.0
    container_name: fitgenie-localstack
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - S3_BUCKET_NAME=fitgenie-images
      - DEBUG=1
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FitGenie API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitgenie-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://fitgenie:fitgenie@postgres:5432/fitgenie?sslmode=disable
      - PORT=8080
      - GIN_MODE=debug
      - S3_ENDPOINT=http://localstack:4566
      - S3_PUBLIC_ENDPOINT=http://172.21.48.1:4566
      - S3_REGION=us-east-1
      - S3_BUCKET=fitgenie-images
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus for metrics collection (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: fitgenie-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    profiles:
      - observability

volumes:
  postgres_data:
  localstack_data:
  prometheus_data: 