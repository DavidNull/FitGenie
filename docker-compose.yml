version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: fitgenie-postgres
    environment:
      POSTGRES_DB: fitgenie
      POSTGRES_USER: fitgenie
      POSTGRES_PASSWORD: fitgenie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitgenie -d fitgenie"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: fitgenie-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://fitgenie:fitgenie@postgres:5432/fitgenie?sslmode=disable
      - PORT=8080
      - GIN_MODE=debug
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data: 