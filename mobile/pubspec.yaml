name: fitgenie
description: FitGenie mobile app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.4
  http: ^1.1.0
  http_parser: ^4.0.2
  provider: ^6.1.1
  path_provider: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/GALLERY.png
    - assets/HOME.png
    - assets/LOGO.png
    - assets/camera.png
    - assets/clothing/
